spring.application.name=wellwater
gg.jte.development-mode=true
app.data.dir=./data
app.site.base-url=${APP_SITE_BASE_URL:}
app.site.google-verification=${APP_SITE_GOOGLE_VERIFICATION:}
app.site.google-analytics-id=${APP_SITE_GOOGLE_ANALYTICS_ID:}
app.site.social-image-path=${APP_SITE_SOCIAL_IMAGE_PATH:/og-card.svg}
app.pseo.csv.path=${PSEO_CSV_PATH:${app.data.dir}/pseo/pages.csv}
app.pseo.citations.path=${PSEO_CITATIONS_CSV_PATH:${app.data.dir}/pseo/page_sources.csv}
app.analytics.csv.path=${ANALYTICS_CSV_PATH:${app.data.dir}/analytics/events.csv}
app.leads.csv.path=${LEADS_CSV_PATH:${app.data.dir}/leads/leads.csv}
app.registry.contaminant.path=${CONTAMINANT_REGISTRY_CSV_PATH:${app.data.dir}/registry/contaminant_registry.csv}
app.registry.symptom.path=${SYMPTOM_REGISTRY_CSV_PATH:${app.data.dir}/registry/symptom_registry.csv}
app.registry.trigger.path=${TRIGGER_REGISTRY_CSV_PATH:${app.data.dir}/registry/trigger_registry.csv}
app.registry.cost.path=${COST_REGISTRY_CSV_PATH:${app.data.dir}/registry/cost_registry.csv}
app.registry.state.path=${STATE_REGISTRY_CSV_PATH:${app.data.dir}/registry/state_resource_registry.csv}
app.admin.username=${APP_ADMIN_USERNAME:}
app.admin.password=${APP_ADMIN_PASSWORD:}
